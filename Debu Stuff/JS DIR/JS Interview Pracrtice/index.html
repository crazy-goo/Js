<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #outer{
            width: 400px;
            height: 400px;
            border: 5px solid black;
            background-color: red;
        }
        #mid{
            width: 200px;
            height: 200px;
            background-color: green;
            margin: auto;
            margin-top: 100px;
            border: 5px solid black;
        }
        #inner{
            width: 100px;
            height: 100px;
            background-color: blue;
            border: 5px solid black;
            margin: auto;
            margin-top: 50px;
        }

        #change{
            font-family:monospace;
            font-weight: bold;
            font-size: 16px;
        }

        button {
            font-family:monospace;
            padding: 3px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- <div id="outer">
        This is the outer div.
        <div id="mid">
            This is the mid div.
            <div id="inner">
                This is the inner div.
            </div>
        </div>
    </div> -->

    <!-- <ul id="list">
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3 </li>
    </ul> -->

    <div id="change">
        "This is a text"
    </div>
    <br>
    <button onclick="changeText()">Change Text</button>
    <button onclick="changeColor()">Change Color</button>
    <button onclick="addEle()">Add Element</button>
</body>



<script>


    function changeText(){
        const  getEle = document.getElementById("change")
        getEle.innerText = "Hi this is my Github Username - '@isdebu999'"
        getEle.style.fontSize = "16px"
    }
    function changeColor(){
        document.body.style.backgroundColor = "skyblue"
    }

    function addEle(){
        let li = document.createElement("li")
        li.innerText = "Go and give a star to my repository!"
        document.getElementById("change").appendChild(li)
    }

    document.getElementById("list").addEventListener("click", function(e){
        if(e.target.tagName === 'LI'){
            console.log(e.target.innerText);
        }
    })



    document.getElementById("outer").addEventListener("click", function(){
        console.log("Click outer div");
        
    } , true)
    document.getElementById("mid").addEventListener("click", function(){
        console.log("Click mid div");
        
    }, true)
    document.getElementById("inner").addEventListener("click", function(){
        console.log("Click inner div");
        
    }, true)
</script>
</html>
