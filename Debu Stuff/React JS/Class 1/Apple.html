<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Problem</title>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');
    body{
        font-family: 'Outfit';
        text-align: center;
        margin-top: 50px;

    }
    .container{
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        margin-top: 50px;
    }
    .basket{
        width: 150px;
        height: 150px;
        border: 2px solid black;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 20px;
    }
    .buttons{
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    button{
        padding: 10px;
        font-size: 18px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h2> "Apple Basket Problem"</h2>

<div class="container">
    
    <div class="basket"><span id="leftBasket"></span> 🍎</div>

    <div class="buttons">
        <button id="right-arrow">→</button>
        <button id="left-arrow">←</button>
    </div>

    <div class="basket" ><span id="rightBasket"></span> 🍎</div>

</div>
</body>
<script>
        const firstBasket = document.getElementById("leftBasket")
        const secondBasket = document.getElementById("rightBasket")
        const rightBtn = document.getElementById("right-arrow")
        const leftBtn = document.getElementById("left-arrow")

        const totalApple = 10;
        let sndBasketAppleCnt = 0;
        let fstBasketAppleCnt = totalApple - sndBasketAppleCnt;

        firstBasket.innerHTML = fstBasketAppleCnt
        secondBasket.innerHTML = sndBasketAppleCnt

        rightBtn.addEventListener('click' , () => {
            if(fstBasketAppleCnt > 0){
                fstBasketAppleCnt--;
                firstBasket.innerHTML = fstBasketAppleCnt
                sndBasketAppleCnt++;
                secondBasket.innerHTML = sndBasketAppleCnt
            }
        })

        leftBtn.addEventListener('click' , () => {
            if(sndBasketAppleCnt > 0){
                sndBasketAppleCnt--;
                secondBasket.innerHTML = sndBasketAppleCnt
                fstBasketAppleCnt++;
                firstBasket.innerHTML = fstBasketAppleCnt
            }
        })
        
</script>
</html>
