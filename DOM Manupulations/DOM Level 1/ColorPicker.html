<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker</title>

<style>
    body {
        height: 100vh;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        
    }

   #container {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    #top {
        display: flex;
        gap: 10px;
    }
    h2,h4 , ul{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS',
         sans-serif;
         color: white;
    }
    
    #main-box {
        width: 320px;
        height: 200px;
        background-color: aquamarine;
        border-radius: 5px;
    }
</style>
</head>

<body>

<div id="container">
    <h2 style="color: white;"> " Add To <span style="color:brown;">Color Picker</span>  ! "</h2>
    <div id="top">
        <div id="main-box"></div>
    </div>
    <input type="color" id="color-picker">
</div>

</body>
<script>
     const mainBox = document.getElementById('main-box')
     const changeColor = document.getElementById('color-picker')

     changeColor.addEventListener('input' , () => {
        mainBox.style.backgroundColor = changeColor.value;
     })
</script>
</html>
