<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Bg Color</title>
</head>
<style>
    h1, h3, h4, button {
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS',
         sans-serif;
    }

    #box{
        width: 200px;
        height: 200px;
        background-color: lightblue;
        margin-top: 20px;
        border-radius: 5px;
    }
    button {
        margin-left:40px;
        margin-top: 8px;
        cursor: pointer;
        padding: 8px;
    }
</style>
<body>
    
    <h1>"Toggle Background Color!"</h1>
    <div id="box"></div>

    <button id="toggle-Btn">Toggle Color</button>
</body>

<script>
    const myBox = document.getElementById("box");
    const btn = document.getElementById("toggle-Btn");

    btn.addEventListener('click', () => {
        const currColor = myBox.style.backgroundColor;
        if(currColor === 'lightblue'){
            myBox.style.backgroundColor = '#FFB6C1';
        } else {
            myBox.style.backgroundColor = 'lightblue';
        }
    });
</script>

</html>
