<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap');


        body {
            font-family: "Outfit", sans-serif;
            background-color: black;
            color: white;

        }

        span {
            color: rgb(11, 170, 11);
        }

        .main {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 80%;
            max-width: 800px;

            display: flex;
            flex-direction: column;
            align-items: center;

            padding: 40px 0px;
            border: 1px solid white;
            border-radius: 8px;
        }

        button,
        input {
            font-family: "Outfit", sans-serif;
            padding: 5px;
            font-size: medium;
        }

        .items {
            display: flex;
            gap: 10px;
        }

        ul {
            margin-top: 20px;
            padding: 0;
        }

        li {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>

</head>

<body>

    <div class="main">
        <h1 style="font-family: monospace;"><span>Todo</span> App.</h1>

        <div class="items">
            <input id="task-input" type="text" placeholder="Enter task">
            <button id="add-btn">Add Task</button>
        </div>

        <ul id="task-list"></ul>
        <footer>
            <p style="font-family: monospace; font-size: small;">Created by - @debu21</p>
        </footer>
    </div>

    <script>

        const input = document.getElementById('task-input')
        const addBtn = document.getElementById('add-btn')
        const taskList = document.getElementById('task-list')

        addBtn.addEventListener('click', addTask)

        //this is just when u type something and hit enter it add task.
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                addTask()
            }
        })

        function addTask() {
            const text = input.value.trim()
            if (text === "") {
                alert("Hey! Hey! enter a task first!")
                return
            }
            const li = document.createElement('li')

            const checkbox = document.createElement('input')
            checkbox.type = 'checkbox'

            const span = document.createElement('span')
            span.innerText = text
            span.style.fontSize = "18px";

            const delBtn = document.createElement('button')
            delBtn.innerText = 'Delete'
            delBtn.style.padding = "1.5px";
            delBtn.style.marginLeft = "10px";

            checkbox.addEventListener('change', () => {
                span.classList.toggle('completed')
            })

            delBtn.addEventListener('click', () => {
                li.remove()
            })

            li.appendChild(checkbox)
            li.appendChild(span)
            li.appendChild(delBtn)

            taskList.appendChild(li)

            input.value = ""
        }

    </script>

</body>

</html>
