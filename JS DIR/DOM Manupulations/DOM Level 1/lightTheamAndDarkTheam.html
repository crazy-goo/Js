<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theam Change!</title>
</head>
<style>
    #main-div {
        padding: 15px;
        border-radius: 4px;
    }

    h1,
    h2,
    h3,
    button {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS',
            sans-serif;
    }

    span,
    label,
    h4 {
        font-size: 16px;
        font-family: monospace;
    }

    button {
        cursor: pointer;
        padding: 8px;
    }

    label {
        font-size: 15px;
    }

    textarea {
        margin-top: 6px;
    }

    #cnt-ch{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS',
            sans-serif;
        
        font-size: 23px;
        color: rgb(43, 187, 43);
    }
</style>

<body>
    <div id="main-div">
        <h2 id="wel-text">Wellcome to Theam Switcher!</h2>
        <button id="btn-switch">Switch to Dark Mode</button>
    </div>

    <div style="padding: 15px;" class="snd-concept">

        <br>
        <br>
        <h2>This is <span id="cnt-ch"> "Count Character"</span> Idea!</h2>
        <label for=""> "Share your Thoughts"</label>
        <br>
        <textarea id="messageBox" cols="43" rows="10" placeholder="Type your stuff..."></textarea>
        <h4>COUNT CHAR: <span id="output">0</span></h4>
    </div>

</body>

<script>
    const mainContener = document.getElementById('main-div');
    const text = document.getElementById('wel-text');
    const btn = document.getElementById('btn-switch');


    btn.addEventListener('click', () => {

        if (mainContener.style.backgroundColor === 'black') {
            //change it to light..
            mainContener.style.backgroundColor = 'white';
            text.style.color = 'black';
            btn.textContent = "Switch to Dark Mode"
        } else {
            mainContener.style.backgroundColor = 'black';
            text.style.color = 'white';
            btn.textContent = "Switch to Light Mode"
        }
    })


    const message = document.getElementById('messageBox')
    const cnt = document.getElementById('output')

    message.addEventListener('input', () => {
        cnt.textContent = message.value.length
        cnt.style.color = 'red'
    })


</script>

</html>
